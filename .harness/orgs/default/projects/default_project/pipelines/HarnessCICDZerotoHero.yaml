pipeline:
  name: Harness-CI-CD-Zero-to-Hero
  identifier: HarnessCICDZerotoHero
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: arumullayaswanth
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Windows
            arch: Arm64
          runtime:
            type: Docker
            spec:
              harnessImageConnectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Building Hello World ==="
                                            cd Episode-01/hello-world-app
                                            mvn clean package -q
                                            echo ""
                                            echo "=== Running the App ==="
                                            java -jar target/hello-world-1.0.0.jar
                                            echo ""
                                            echo "=== Pipeline Success! ==="
              - step:
                  type: Run
                  name: Run_2
                  identifier: Run_2
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Building Hello World ==="
                                            cd Episode-01/hello-world-app
                                            mvn clean package -q
                                            echo ""
                                            echo "=== Running the App ==="
                                            java -jar target/hello-world-1.0.0.jar
                                            echo ""
                                            echo "=== Pipeline Success! ==="
