pipeline:
  name: python-docker-pipeline
  identifier: python_docker_pipeline
  projectIdentifier: HarnessCICDZerotoHero
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.Github
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  stages:
    - stage:
        name: build-python
        identifier: build_python
        description: Build, test, and push to Docker Hub
        type: CI
        spec:
          cloneCodebase: true
          delegateSelectors:
            - helm-delegate
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: install_deps
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 1: Installing Dependencies ==="
                      cd Episode-02/python-project
                      pip install -r requirements.txt
                      echo "=== Dependencies Installed! ==="
              - step:
                  type: Run
                  name: Run Tests
                  identifier: run_tests
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 2: Running Unit Tests ==="
                      cd Episode-02/python-project
                      pip install -r requirements.txt
                      pytest test_app.py -v
                      echo "=== All 3 Tests Passed! ==="
              - step:
                  type: Run
                  name: Run App
                  identifier: run_app
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 3: Verifying App Works ==="
                      cd Episode-02/python-project
                      pip install -r requirements.txt
                      python -c "from app import app; client = app.test_client(); r = client.get('/'); print(r.get_json()); r = client.get('/health'); print(r.get_json()); print('=== App Verified! ===')"
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push to Docker Hub
                  identifier: build_push_docker
                  spec:
                    connectorRef: dockerhub
                    repo: <+variable.docker_username>/python-harness-app
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: Episode-02/python-project/Dockerfile
                    context: Episode-02/python-project
              - step:
                  type: Run
                  name: Verify Push
                  identifier: verify_push
                  spec:
                    shell: Sh
                    command: |-
                      echo "========================================="
                      echo "  Step 5: Image Pushed Successfully!"
                      echo ""
                      echo "  Image: <+variable.docker_username>/python-harness-app:<+pipeline.sequenceId>"
                      echo "  Image: <+variable.docker_username>/python-harness-app:latest"
                      echo ""
                      echo "  View: https://hub.docker.com/r/<+variable.docker_username>/python-harness-app"
                      echo "========================================="
              - step:
                  type: Run
                  name: Wait Before Cleanup
                  identifier: wait_before_cleanup
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 6: Waiting 1 minute ==="
                      echo "Giving Docker Hub time to process the push..."
                      sleep 60
                      echo "=== Done waiting! Proceeding to cleanup ==="
              - step:
                  type: Run
                  name: Delete and Verify
                  identifier: delete_and_verify
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 7: Deleting Docker Hub Image ==="
                      echo ""
                      TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username":"<+variable.docker_username>","password":"<+secrets.getValue("docker-hub-password")>"}' https://hub.docker.com/v2/users/login/ | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
                      echo "Logged in to Docker Hub API"
                      echo ""
                      echo "Deleting entire repository: <+variable.docker_username>/python-harness-app"
                      curl -s -X DELETE -H "Authorization: JWT $TOKEN" https://hub.docker.com/v2/repositories/<+variable.docker_username>/python-harness-app/
                      echo ""
                      echo "=== Repository Deleted! ==="
                      echo "Next run will create it fresh again."
              - step:
                  type: Run
                  name: Final Verify
                  identifier: final_verify
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 8: Final Verification ==="
                      echo ""
                      echo "Checking if repository still exists on Docker Hub..."
                      echo ""
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hub.docker.com/v2/repositories/<+variable.docker_username>/python-harness-app/)
                      if [ "$STATUS" = "404" ]; then
                        echo "✅ Repository python-harness-app — DELETED (not found)"
                      else
                        echo "⚠️ Repository may still exist (status: $STATUS)"
                      fi
                      echo ""
                      echo "========================================="
                      echo "  ALL DONE!"
                      echo "  Step 1: Dependencies installed ✅"
                      echo "  Step 2: Tests passed ✅"
                      echo "  Step 3: App verified ✅"
                      echo "  Step 4: Image pushed to Docker Hub ✅"
                      echo "  Step 5: Push verified ✅"
                      echo "  Step 6: Waited 1 minute ✅"
                      echo "  Step 7: Image deleted from Docker Hub ✅"
                      echo "  Step 8: Deletion verified ✅"
                      echo "========================================="
        delegateSelectors:
          - kubernetes-delegate
