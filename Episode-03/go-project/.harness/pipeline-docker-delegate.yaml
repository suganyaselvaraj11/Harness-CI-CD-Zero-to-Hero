# ============================================
# PIPELINE: Go App - Docker Delegate on AWS EC2
# ============================================
#
# WHAT YOU NEED:
#   1. AWS EC2 with Docker + Delegate (--network host) + Runner v0.1.20
#   2. GitHub connector (account.Github)
#   3. Docker Hub connector (dockerhub) at project level
#   4. Secret "docker-hub-password"
#   5. Variable "docker_username"
#
# CHANGE THESE VALUES:
#   1. projectIdentifier → Your project ID
#   2. orgIdentifier → Your org name
#   3. connectorRef → Your connectors
#
# ============================================
pipeline:
  name: go-docker-delegate-pipeline
  identifier: go_docker_delegate_pipeline
  # CHANGE THIS: Your project ID
  projectIdentifier: HarnessCICDZerotoHero
  # CHANGE THIS: Your org name
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        # CHANGE THIS: Your GitHub connector
        connectorRef: account.Github
        # CHANGE THIS: Your repo name
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  stages:
    - stage:
        name: build-go
        identifier: build_go
        description: "Build, test, push Go app"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              # Step 1: Run unit tests
              - step:
                  type: Run
                  name: Run Tests
                  identifier: run_tests
                  spec:
                    shell: Sh
                    image: golang:1.21-alpine
                    command: |-
                      echo "=== Step 1: Running Go Tests ==="
                      cd Episode-03/go-project
                      go test -v ./...
                      echo "=== All Tests Passed! ==="

              # Step 2: Lint Check
              - step:
                  type: Run
                  name: Lint Check
                  identifier: lint_check
                  spec:
                    shell: Sh
                    image: golangci/golangci-lint:latest
                    command: |-
                      echo "=== Step 2: Running Lint Check ==="
                      cd Episode-03/go-project
                      golangci-lint run ./... || echo "Lint warnings found (non-blocking)"
                      echo "=== Lint Check Done! ==="

              # Step 3: Code Coverage
              - step:
                  type: Run
                  name: Code Coverage
                  identifier: code_coverage
                  spec:
                    shell: Sh
                    image: golang:1.21-alpine
                    command: |-
                      echo "=== Step 3: Code Coverage ==="
                      cd Episode-03/go-project
                      go test -coverprofile=coverage.out ./...
                      go tool cover -func=coverage.out
                      COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
                      echo "Total Coverage: $COVERAGE"
                      echo "=== Coverage Done! ==="

              # Step 4: Build Go binary
              - step:
                  type: Run
                  name: Build App
                  identifier: build_app
                  spec:
                    shell: Sh
                    image: golang:1.21-alpine
                    command: |-
                      echo "=== Step 4: Building Go App ==="
                      cd Episode-03/go-project
                      go build -o main .
                      ls -lh main
                      echo "=== Build Successful! ==="

              # Step 5: Run app and verify
              - step:
                  type: Run
                  name: Verify App
                  identifier: verify_app
                  spec:
                    shell: Sh
                    image: golang:1.21-alpine
                    command: |-
                      echo "=== Step 5: Verifying App ==="
                      cd Episode-03/go-project
                      go build -o main .
                      ./main &
                      sleep 2
                      wget -qO- http://localhost:8080/
                      echo ""
                      wget -qO- http://localhost:8080/health
                      echo ""
                      echo "=== App Verified! ==="
                      kill %1 2>/dev/null || true

              # Step 6: Build and Push Docker image
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push to Docker Hub
                  identifier: build_push_docker
                  spec:
                    connectorRef: dockerhub
                    repo: <+variable.docker_username>/go-harness-app
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: Episode-03/go-project/Dockerfile
                    context: Episode-03/go-project

              # Step 7: Verify image on Docker Hub
              - step:
                  type: Run
                  name: Verify Push
                  identifier: verify_push
                  spec:
                    shell: Sh
                    image: alpine:latest
                    command: |-
                      echo "=== Step 7: Verifying Image on Docker Hub ==="
                      apk add --no-cache curl > /dev/null 2>&1
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hub.docker.com/v2/repositories/<+variable.docker_username>/go-harness-app/tags/<+pipeline.sequenceId>/)
                      if [ "$STATUS" = "200" ]; then
                        echo "✅ Image tag <+pipeline.sequenceId> EXISTS on Docker Hub!"
                      else
                        echo "❌ Image NOT found (status: $STATUS)"
                      fi
                      echo ""
                      echo "View: https://hub.docker.com/r/<+variable.docker_username>/go-harness-app"
                      echo "=== Verification Done! ==="

              # Step 8: Pipeline Complete
              - step:
                  type: Run
                  name: Pipeline Complete
                  identifier: pipeline_complete
                  spec:
                    shell: Sh
                    image: alpine:latest
                    command: |-
                      echo "========================================="
                      echo "  PIPELINE COMPLETE!"
                      echo ""
                      echo "  Step 1: Tests passed ✅"
                      echo "  Step 2: Lint check ✅"
                      echo "  Step 3: Coverage report ✅"
                      echo "  Step 4: Binary built ✅"
                      echo "  Step 5: App verified ✅"
                      echo "  Step 6: Docker image pushed ✅"
                      echo "  Step 7: Push verified ✅"
                      echo ""
                      echo "  Image: <+variable.docker_username>/go-harness-app:<+pipeline.sequenceId>"
                      echo "========================================="

              # Step 9: Verify success
              - step:
                  type: Run
                  name: Verify Success
                  identifier: verify_success
                  spec:
                    shell: Sh
                    image: alpine:latest
                    command: |-
                      echo "=== Step 9: Final Verification ==="
                      apk add --no-cache curl > /dev/null 2>&1
                      echo "Image: <+variable.docker_username>/go-harness-app:<+pipeline.sequenceId>"
                      echo "Image: <+variable.docker_username>/go-harness-app:latest"
                      echo ""
                      echo "Docker Hub: https://hub.docker.com/r/<+variable.docker_username>/go-harness-app"
                      echo "=== All Good! ==="

              # Step 10: Wait 1 minute before cleanup
              - step:
                  type: Run
                  name: Wait Before Cleanup
                  identifier: wait_cleanup
                  spec:
                    shell: Sh
                    image: alpine:latest
                    command: |-
                      echo "=== Step 10: Waiting 1 minute before cleanup ==="
                      sleep 60
                      echo "=== Done waiting! ==="

              # Step 11: Delete Docker Hub repository and verify
              - step:
                  type: Run
                  name: Delete and Verify
                  identifier: delete_verify
                  spec:
                    shell: Sh
                    image: alpine:latest
                    command: |-
                      echo "=== Step 11: Deleting Docker Hub Repository ==="
                      apk add --no-cache curl python3 > /dev/null 2>&1
                      TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username":"<+variable.docker_username>","password":"<+secrets.getValue("docker-hub-password")>"}' https://hub.docker.com/v2/users/login/ | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
                      echo "Deleting repository: <+variable.docker_username>/go-harness-app"
                      curl -s -X DELETE -H "Authorization: JWT $TOKEN" https://hub.docker.com/v2/repositories/<+variable.docker_username>/go-harness-app/
                      echo ""
                      sleep 5
                      echo "=== Verifying Deletion ==="
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hub.docker.com/v2/repositories/<+variable.docker_username>/go-harness-app/)
                      if [ "$STATUS" = "404" ]; then
                        echo "✅ Repository DELETED successfully!"
                      else
                        echo "⚠️ Repository may still exist (status: $STATUS)"
                      fi
                      echo ""
                      echo "========================================="
                      echo "  ALL DONE! Repository cleaned up."
                      echo "========================================="
