# ============================================
# PIPELINE: Terraform on Harness Cloud
# Creates VPC + EC2 or Destroys everything
# ============================================
# NO Delegate needed! Uses Harness Cloud.
#
# PREREQUISITES:
#   1. S3 bucket created manually (for Terraform state)
#   2. Secrets in Harness:
#      - aws-access-key (AWS Access Key ID)
#      - aws-secret-key (AWS Secret Access Key)
#   3. Variables in Harness:
#      - s3_bucket_name (your state bucket name)
#      - aws_region (us-east-1)
#
# HOW TO USE:
#   Run pipeline → Choose action: "apply" or "destroy"
#   apply = creates VPC + EC2
#   destroy = deletes everything, bill = $0
#
# CHANGE THESE:
#   - projectIdentifier
#   - orgIdentifier
#   - connectorRef
# ============================================
pipeline:
  name: terraform-infra-pipeline
  identifier: terraform_infra_pipeline
  # CHANGE THIS: Your project ID
  projectIdentifier: HarnessCICDZerotoHero
  # CHANGE THIS: Your org
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        # CHANGE THIS: Your GitHub connector
        connectorRef: account.Github
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  # Runtime input: user picks "apply" or "destroy"
  variables:
    - name: tf_action
      type: String
      description: "Choose: apply or destroy"
      value: <+input>
  stages:
    - stage:
        name: terraform
        identifier: terraform
        description: "Apply or Destroy AWS infrastructure"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              # Step 1: Terraform Init
              - step:
                  type: Run
                  name: Terraform Init
                  identifier: tf_init
                  spec:
                    shell: Sh
                    envVariables:
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("aws-access-key")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws-secret-key")>
                      AWS_DEFAULT_REGION: <+variable.aws_region>
                    command: |-
                      echo "=== Terraform Init ==="
                      cd Episode-03/terraform-project
                      terraform init \
                        -backend-config="bucket=<+variable.s3_bucket_name>" \
                        -backend-config="key=harness-demo/terraform.tfstate" \
                        -backend-config="region=<+variable.aws_region>"
                      echo "=== Init Done! ==="

              # Step 2: Terraform Plan
              - step:
                  type: Run
                  name: Terraform Plan
                  identifier: tf_plan
                  spec:
                    shell: Sh
                    envVariables:
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("aws-access-key")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws-secret-key")>
                      AWS_DEFAULT_REGION: <+variable.aws_region>
                    command: |-
                      echo "=== Terraform Plan (action: <+pipeline.variables.tf_action>) ==="
                      cd Episode-03/terraform-project
                      if [ "<+pipeline.variables.tf_action>" = "destroy" ]; then
                        terraform plan -destroy -no-color
                      else
                        terraform plan -no-color
                      fi
                      echo "=== Plan Done! ==="

              # Step 3: Terraform Apply or Destroy
              - step:
                  type: Run
                  name: Terraform Execute
                  identifier: tf_execute
                  spec:
                    shell: Sh
                    envVariables:
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("aws-access-key")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws-secret-key")>
                      AWS_DEFAULT_REGION: <+variable.aws_region>
                    command: |-
                      echo "=== Terraform <+pipeline.variables.tf_action> ==="
                      cd Episode-03/terraform-project
                      if [ "<+pipeline.variables.tf_action>" = "destroy" ]; then
                        terraform destroy -auto-approve -no-color
                        echo ""
                        echo "========================================="
                        echo "  DESTROYED! All resources deleted."
                        echo "  AWS bill for these resources: $0"
                        echo "========================================="
                      else
                        terraform apply -auto-approve -no-color
                        echo ""
                        echo "========================================="
                        echo "  CREATED!"
                        terraform output
                        echo "========================================="
                      fi
