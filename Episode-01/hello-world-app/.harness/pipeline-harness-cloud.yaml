# Pipeline: Using HARNESS CLOUD (No Delegate Needed!)
# ⚠️ CHANGE THESE 4 VALUES TO MATCH YOUR HARNESS ACCOUNT:
#   - name: any name you want
#   - identifier: same as name (no spaces, use underscore)
#   - projectIdentifier: YOUR project ID (find in Project Settings or URL)
#   - orgIdentifier: YOUR org ID (usually "default")
#   - connectorRef: YOUR GitHub connector name
#   - repoName: YOUR GitHub repository name
pipeline:
  name: yaswanth
  identifier: yaswanth
  projectIdentifier: HarnessCICDZerotoHero
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: HarnessCICDZerotoHero
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  stages:
    - stage:
        name: dev
        identifier: dev
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    shell: Sh
                    command: |
                      echo "=== Hello from Harness CI/CD! ==="
                      echo "Pipeline running on Harness Cloud"
                      echo "=== Success! ==="
