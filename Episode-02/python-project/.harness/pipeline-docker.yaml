# ============================================
# PIPELINE: Python App - Harness Cloud + Push to Docker Hub
# ============================================
# NO Delegate needed! NO Docker Desktop needed!
# Harness Cloud does everything.
#
# CHANGE THESE 4 VALUES:
#   1. projectIdentifier → Your project ID (from URL)
#   2. orgIdentifier → Your org name (usually "default")
#   3. connectorRef (codebase) → Your GitHub connector
#   4. connectorRef (docker) → Your Docker Hub connector
#
# PREREQUISITES:
#   - Harness Cloud enabled (credit card verification, no charge)
#   - Docker Hub connector created in Harness (account.dockerhub)
#   - Secret "docker-hub-password" in Harness
#   - Variable "docker_username" in Harness
# ============================================
pipeline:
  name: python-docker-pipeline
  identifier: python_docker_pipeline
  # CHANGE THIS: Your project ID
  projectIdentifier: HarnessCICDZerotoHero
  # CHANGE THIS: Your org name
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        # CHANGE THIS: Your GitHub connector
        connectorRef: account.Github
        # CHANGE THIS: Your repo name
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  stages:
    - stage:
        name: build-python
        identifier: build_python
        description: "Build, test, and push to Docker Hub"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              # Step 1: Install dependencies
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: install_deps
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 1: Installing Dependencies ==="
                      cd Episode-02/python-project
                      pip install -r requirements.txt
                      echo "=== Dependencies Installed! ==="

              # Step 2: Run unit tests
              - step:
                  type: Run
                  name: Run Tests
                  identifier: run_tests
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 2: Running Unit Tests ==="
                      cd Episode-02/python-project
                      pip install -r requirements.txt
                      pytest test_app.py -v
                      echo "=== All 3 Tests Passed! ==="

              # Step 3: Run app and verify
              - step:
                  type: Run
                  name: Run App
                  identifier: run_app
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 3: Verifying App Works ==="
                      cd Episode-02/python-project
                      pip install -r requirements.txt
                      python -c "from app import app; client = app.test_client(); r = client.get('/'); print(r.get_json()); r = client.get('/health'); print(r.get_json()); print('=== App Verified! ===')"

              # Step 4: Build Docker image and Push to Docker Hub
              # Uses Harness built-in step (no privileged mode needed)
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push to Docker Hub
                  identifier: build_push_docker
                  spec:
                    # CHANGE THIS: Your Docker Hub connector name
                    connectorRef: dockerhub
                    repo: <+variable.docker_username>/python-harness-app
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: Episode-02/python-project/Dockerfile
                    context: Episode-02/python-project

              # Step 5: Verify success
              - step:
                  type: Run
                  name: Verify Push
                  identifier: verify_push
                  spec:
                    shell: Sh
                    command: |-
                      echo "========================================="
                      echo "  PIPELINE COMPLETE!"
                      echo ""
                      echo "  Image pushed to Docker Hub:"
                      echo "  <+variable.docker_username>/python-harness-app:<+pipeline.sequenceId>"
                      echo "  <+variable.docker_username>/python-harness-app:latest"
                      echo ""
                      echo "  View: https://hub.docker.com/r/<+variable.docker_username>/python-harness-app"
                      echo "========================================="
