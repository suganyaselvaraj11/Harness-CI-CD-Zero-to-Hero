# ============================================
# PIPELINE: C++ Enterprise CI Pipeline (Episode 4)
# ============================================
# Flow: Clone → Install Deps → Unit Test → Build → Docker Build → Push Docker Hub → Push ECR
#
# CHANGE THESE:
#   - projectIdentifier
#   - orgIdentifier
#   - connectorRef (GitHub, Docker Hub, AWS)
# ============================================
pipeline:
  name: cpp-enterprise-ci-pipeline
  identifier: cpp_enterprise_ci_pipeline
  # CHANGE THIS: Your project ID
  projectIdentifier: HarnessCICDZerotoHero
  # CHANGE THIS: Your org
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        # CHANGE THIS: Your GitHub connector
        connectorRef: account.Github
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  # Runtime Inputs: user selects version and environment when running
  variables:
    - name: deploy_version
      type: String
      description: "Enter deploy version (e.g. 1.0.0, 2.1.3)"
      value: <+input>
    - name: environment
      type: String
      description: "Select environment"
      value: <+input>.allowedValues(development,testing,staging,production)
  stages:
    - stage:
        name: build-cpp
        identifier: build_cpp
        description: "Enterprise CI Pipeline for C++ App"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              # Step 1: Install Dependencies
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: install_deps
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 1: Installing Dependencies ==="
                      apt-get update -qq
                      apt-get install -y -qq cmake g++ make
                      echo "CMake version: $(cmake --version | head -1)"
                      echo "GCC version: $(g++ --version | head -1)"
                      echo "=== Dependencies Installed! ==="

              # Step 2: Unit Tests
              - step:
                  type: Run
                  name: Unit Tests
                  identifier: unit_tests
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 2: Running Unit Tests ==="
                      cd Episode-04/cpp-project
                      mkdir -p build && cd build
                      cmake ..
                      make tests
                      ./tests
                      echo "=== All Tests Passed! ==="

              # Step 3: Build Application
              - step:
                  type: Run
                  name: Build Application
                  identifier: build_app
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Step 3: Building C++ Application ==="
                      cd Episode-04/cpp-project
                      mkdir -p build && cd build
                      cmake ..
                      make app
                      echo "Binary size:"
                      ls -lh app
                      echo "=== Build Successful! ==="

              # Step 4: Build and Push to Docker Hub
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Push to Docker Hub
                  identifier: push_dockerhub
                  spec:
                    # CHANGE THIS: Your Docker Hub connector
                    connectorRef: dockerhub
                    repo: <+variable.docker_username>/cpp-harness-app
                    tags:
                      - <+pipeline.variables.deploy_version>-<+pipeline.variables.environment>
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: Episode-04/cpp-project/Dockerfile
                    context: Episode-04/cpp-project

              # Step 5: Verify Docker Hub Push
              - step:
                  type: Run
                  name: Verify Images
                  identifier: verify_images
                  spec:
                    shell: Sh
                    command: |-
                      echo "========================================="
                      echo "  STAGE 1 COMPLETE! (Build & Push Docker Hub)"
                      echo ""
                      echo "  Version: <+pipeline.variables.deploy_version>"
                      echo "  Environment: <+pipeline.variables.environment>"
                      echo "  Docker Hub: <+variable.docker_username>/cpp-harness-app:<+pipeline.variables.deploy_version>-<+pipeline.variables.environment>"
                      echo "========================================="

    # ============================================
    # STAGE 2: Push to Amazon ECR
    # ============================================
    - stage:
        name: push-to-ecr
        identifier: push_to_ecr
        description: "Push Docker image to Amazon ECR"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              # Step 1: Build and Push to Amazon ECR
              - step:
                  type: BuildAndPushECR
                  name: Push to ECR
                  identifier: push_ecr
                  spec:
                    # CHANGE THIS: Your AWS connector (OIDC)
                    connectorRef: account.aws_account
                    region: us-east-1
                    account: <+variable.aws_account_id>
                    imageName: cpp-harness-app
                    tags:
                      - <+pipeline.variables.deploy_version>-<+pipeline.variables.environment>
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: Episode-04/cpp-project/Dockerfile
                    context: Episode-04/cpp-project

              # Step 2: Verify ECR Push
              - step:
                  type: Run
                  name: Verify ECR Image
                  identifier: pull_verify_ecr
                  spec:
                    shell: Sh
                    image: amazon/aws-cli:latest
                    envVariables:
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("aws_access_key_id")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws_secret_access_key")>
                      AWS_DEFAULT_REGION: us-east-1
                    command: |-
                      echo "=== Step 2: Verifying Image on ECR ==="
                      aws ecr describe-images \
                        --repository-name cpp-harness-app \
                        --image-ids imageTag=<+pipeline.variables.deploy_version>-<+pipeline.variables.environment> \
                        --region us-east-1
                      echo ""
                      echo "✅ Image EXISTS on ECR!"
                      echo "=== Verification Done! ==="

              # Step 3: Final Summary
              - step:
                  type: Run
                  name: Final Summary
                  identifier: verify_ecr
                  spec:
                    shell: Sh
                    command: |-
                      echo "========================================="
                      echo "  ENTERPRISE CI PIPELINE COMPLETE!"
                      echo ""
                      echo "  Version: <+pipeline.variables.deploy_version>"
                      echo "  Environment: <+pipeline.variables.environment>"
                      echo ""
                      echo "  Stage 1: Build + Docker Hub ✅"
                      echo "  Stage 2: Amazon ECR ✅"
                      echo ""
                      echo "  Docker Hub: <+variable.docker_username>/cpp-harness-app:<+pipeline.variables.deploy_version>-<+pipeline.variables.environment>"
                      echo "  ECR: <+variable.aws_account_id>.dkr.ecr.us-east-1.amazonaws.com/cpp-harness-app:<+pipeline.variables.deploy_version>-<+pipeline.variables.environment>"
                      echo ""
                      echo "  All Tags:"
                      echo "    - <+pipeline.variables.deploy_version>-<+pipeline.variables.environment>"
                      echo "    - <+pipeline.sequenceId>"
                      echo "    - latest"
                      echo "========================================="

    # ============================================
    # STAGE 3 & 4: Delete Docker Hub + ECR (PARALLEL)
    # ============================================
    - parallel:
        - stage:
            name: cleanup-dockerhub
            identifier: cleanup_dockerhub
            description: "Wait 2 min then delete Docker Hub repo"
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  # Step 1: Wait 2 minutes
                  - step:
                      type: Run
                      name: Wait 2 Minutes
                      identifier: wait_2min_dh
                      spec:
                        shell: Sh
                        command: |-
                          echo "=== Waiting 2 minutes before Docker Hub cleanup ==="
                          sleep 120
                          echo "=== Done waiting! ==="

                  # Step 2: Delete Docker Hub repository
                  - step:
                      type: Run
                      name: Delete Docker Hub Repo
                      identifier: delete_dockerhub
                      spec:
                        shell: Sh
                        command: |-
                          echo "=== Deleting Docker Hub Repository ==="
                          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username":"<+variable.docker_username>","password":"<+secrets.getValue("docker-hub-password")>"}' https://hub.docker.com/v2/users/login/ | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
                          echo "Deleting: <+variable.docker_username>/cpp-harness-app"
                          curl -s -X DELETE -H "Authorization: JWT $TOKEN" https://hub.docker.com/v2/repositories/<+variable.docker_username>/cpp-harness-app/
                          echo ""
                          sleep 5
                          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hub.docker.com/v2/repositories/<+variable.docker_username>/cpp-harness-app/)
                          if [ "$STATUS" = "404" ]; then
                            echo "✅ Docker Hub repo DELETED!"
                          else
                            echo "⚠️ May still exist (status: $STATUS)"
                          fi
                          echo "=== Docker Hub Cleanup Done! ==="

        - stage:
            name: cleanup-ecr
            identifier: cleanup_ecr
            description: "Wait 2 min then delete ECR images and repository"
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  # Step 1: Wait 2 minutes
                  - step:
                      type: Run
                      name: Wait 2 Minutes
                      identifier: wait_2min_ecr
                      spec:
                        shell: Sh
                        command: |-
                          echo "=== Waiting 2 minutes before ECR cleanup ==="
                          sleep 120
                          echo "=== Done waiting! ==="

                  # Step 2: Delete ECR images and repository
                  - step:
                      type: Run
                      name: Delete ECR Repo
                      identifier: delete_ecr
                      spec:
                        shell: Sh
                        image: amazon/aws-cli:latest
                        envVariables:
                          AWS_ACCESS_KEY_ID: <+secrets.getValue("aws_access_key_id")>
                          AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws_secret_access_key")>
                          AWS_DEFAULT_REGION: us-east-1
                        command: |-
                          echo "=== Deleting ECR Repository ==="
                          echo ""
                          echo "Deleting all images in cpp-harness-app..."
                          aws ecr batch-delete-image \
                            --repository-name cpp-harness-app \
                            --image-ids imageTag=<+pipeline.variables.deploy_version>-<+pipeline.variables.environment> imageTag=<+pipeline.sequenceId> imageTag=latest \
                            --region us-east-1 || true
                          echo ""
                          echo "Deleting repository..."
                          aws ecr delete-repository \
                            --repository-name cpp-harness-app \
                            --force \
                            --region us-east-1 || true
                          echo ""
                          echo "=== Verifying ==="
                          aws ecr describe-repositories --repository-names cpp-harness-app --region us-east-1 2>&1 || echo "✅ ECR repo DELETED!"
                          echo ""
                          echo "========================================="
                          echo "  ALL CLEANUP COMPLETE!"
                          echo "  Docker Hub: Deleted ✅"
                          echo "  ECR: Deleted ✅"
                          echo "========================================="
